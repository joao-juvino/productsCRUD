name: CI - ProductsCRUD

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 📦 Restaurar dependências
        run: dotnet restore

      - name: 🏗️ Build
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Rodar testes com cobertura
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" 

      - name: 📊 Instalar ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: 📈 Gerar relatório de cobertura
        run: |
          reportgenerator \
            -reports:tests/ProductsCRUD.Tests/TestResults/**/coverage.cobertura.xml \
            -targetdir:./coverage-report \
            -reporttypes:TextSummary

      - name: 🚨 Validar cobertura mínima (80%)
        run: |
          COVERAGE=$(grep -Po 'Line coverage: \K[0-9.]+' coverage-report/Summary.txt)
          echo "Coverage: $COVERAGE%"

          COVERAGE_INT=${COVERAGE%.*}

          if [ "$COVERAGE_INT" -lt "80" ]; then
            echo "❌ Coverage abaixo de 80%"
            exit 1
          else
            echo "✅ Coverage OK"
          fi